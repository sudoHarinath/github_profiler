<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSS Contributor Scorecard</title>
    <!-- Tailwind Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- ChartJS Engine -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div class="max-w-5xl mx-auto px-4 py-8">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                OSS Contributor Scorecard
            </h1>
            <p class="text-slate-400 mt-2">Transforming raw code commits into clear developer profiles</p>
            
            <!-- Input Controller Block -->
            <div class="mt-6 max-w-md mx-auto flex gap-2">
                <input type="text" id="usernameInput" placeholder="Enter GitHub username (e.g. octocat)" 
                       class="w-full px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-slate-100 focus:outline-none focus:border-cyan-500 transition-colors">
                <button id="searchBtn" class="px-6 py-2 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white font-medium transition-colors cursor-pointer">
                    Analyze
                </button>
            </div>
            <!-- Dynamic Error Container -->
            <div id="errorBanner" class="hidden max-w-md mx-auto mt-4 p-3 bg-red-900/50 border border-red-700 text-red-200 rounded-lg text-sm text-center"></div>
        </header>

        <!-- Main Scorecard Results Section (Hidden until search completes) -->
        <main id="scorecardContent" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Left Panel: Profile Detail Overview -->
            <div class="bg-slate-800/50 border border-slate-700/50 rounded-xl p-6 text-center flex flex-col items-center">
                <img id="devAvatar" src="" alt="Avatar" class="w-24 h-24 rounded-full border-2 border-cyan-500 mb-4 shadow-lg">
                <h2 id="devName" class="text-xl font-bold"></h2>
                <p id="devHandle" class="text-cyan-400 text-sm mb-2"></p>
                <div id="devArchetype" class="px-3 py-1 bg-blue-500/20 text-blue-300 border border-blue-500/30 rounded-full text-xs font-semibold my-2"></div>
                <p id="devBio" class="text-slate-400 text-sm mt-2 italic px-2"></p>
                <div class="mt-auto pt-4 text-xs text-slate-500 border-t border-slate-700/50 w-full flex justify-between px-2">
                    <span>Source: <strong id="dataSourceField" class="uppercase"></strong></span>
                </div>
            </div>

            <!-- Center Panel: Aggregated Impact Statistics Matrix -->
            <div class="bg-slate-800/50 border border-slate-700/50 rounded-xl p-6 grid grid-cols-2 gap-4">
                <div class="bg-slate-900/40 border border-slate-800 p-4 rounded-lg text-center">
                    <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Impact Score</span>
                    <div id="metricImpact" class="text-3xl font-black text-cyan-400 mt-1">0</div>
                </div>
                <div class="bg-slate-900/40 border border-slate-800 p-4 rounded-lg text-center">
                    <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Public Repos</span>
                    <div id="metricRepos" class="text-3xl font-bold mt-1">0</div>
                </div>
                <div class="bg-slate-900/40 border border-slate-800 p-4 rounded-lg text-center">
                    <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Total Stars</span>
                    <div id="metricStars" class="text-3xl font-bold text-amber-400 mt-1">0</div>
                </div>
                <div class="bg-slate-900/40 border border-slate-800 p-4 rounded-lg text-center">
                    <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Total Forks</span>
                    <div id="metricForks" class="text-3xl font-bold mt-1">0</div>
                </div>
            </div>

            <!-- Right Panel: Visual Technology Footprint Grid -->
            <div class="bg-slate-800/50 border border-slate-700/50 rounded-xl p-6 flex flex-col justify-between">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-2">Technology Footprint</h3>
                <div class="relative max-h-[180px] flex justify-center items-center">
                    <canvas id="languageChart"></canvas>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
